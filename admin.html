<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · VCF Exchange</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0A66C2;
            --primary-dark: #084A8C;
            --primary-light: #E8F0FE;
            --primary-glow: rgba(10, 102, 194, 0.15);
            --success: #25D366;
            --danger: #DC2626;
            --warning: #F59E0B;
            --gray-50: #F8FAFC;
            --gray-100: #F1F5F9;
            --gray-200: #E2E8F0;
            --gray-300: #CBD5E1;
            --gray-400: #94A3B8;
            --gray-500: #64748B;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1E293B;
            --gray-900: #0F172A;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.08);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #F8FAFC 0%, #E8F0FE 100%);
            color: var(--gray-900);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.3px;
        }

        .logo-text span {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .badge {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            background: var(--primary-light);
            padding: 5px 16px;
            border-radius: 100px;
            border: 1px solid rgba(10, 102, 194, 0.12);
        }

        .btn-logout {
            padding: 6px 16px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            background: transparent;
            color: var(--gray-500);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
        }

        .btn-logout:hover {
            background: var(--gray-100);
            color: var(--gray-700);
            border-color: var(--gray-300);
        }

        /* Main */
        .main {
            flex: 1;
            padding: 40px 0 64px;
        }

        /* Login */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(226, 232, 240, 0.6);
            box-shadow: var(--shadow-md);
            padding: 48px;
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.5s ease;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 6px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--gray-500);
            margin-bottom: 28px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-form .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: inherit;
            color: var(--gray-900);
            background: #fff;
            transition: all var(--transition);
        }

        .login-form .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .login-form .btn {
            padding: 12px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 16px var(--primary-glow);
        }

        .login-form .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .login-error {
            color: var(--danger);
            font-size: 13px;
            font-weight: 500;
            display: none;
            padding: 8px 12px;
            background: #FEE2E2;
            border-radius: var(--radius);
        }

        .login-error.show {
            display: block;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            animation: fadeUp 0.5s ease;
        }

        .dashboard.active {
            display: block;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(226, 232, 240, 0.6);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }

        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .stat-card-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--gray-400);
        }

        .stat-card-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--gray-900);
            margin-top: 2px;
        }

        .stat-card-value.primary {
            color: var(--primary);
        }
        .stat-card-value.success {
            color: var(--success);
        }
        .stat-card-value.danger {
            color: var(--danger);
        }
        .stat-card-value.warning {
            color: var(--warning);
        }

        /* Admin Timer */
        .admin-timer {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(226, 232, 240, 0.6);
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }

        .admin-timer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .admin-timer-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-600);
        }

        .admin-timer-display {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .admin-timer-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--gray-50);
            padding: 6px 14px;
            border-radius: 8px;
            min-width: 48px;
        }

        .admin-timer-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
            font-variant-numeric: tabular-nums;
        }

        .admin-timer-unit {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--gray-400);
            font-weight: 600;
        }

            font-size: 18px;
            color: var(--gray-
